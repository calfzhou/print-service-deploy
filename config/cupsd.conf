# ================================
# CUPS 配置文件
# ================================

LogLevel warn
PageLogFormat
MaxLogSize 0
MaxRequestSize 500MB

# ========== 监听 ==========
Port 631
Listen /run/cups/cups.sock

# ========== 服务器别名（解决某些客户端连接问题） ==========
ServerAlias *

# ========== SSL/TLS 兼容性设置（支持Win7等旧系统） ==========
# 默认不强制加密（允许HTTP连接）
DefaultEncryption Never
# 如果需要支持HTTPS，降低TLS版本要求
# SSLOptions AllowRC4 AllowSSL3

# ========== 连续打印优化配置 ==========
MaxJobs 1000
MaxJobsPerPrinter 100
JobKillDelay 10
FilterLimit 0

# ========== 兼容性设置 ==========
# 允许原始打印（某些应用需要）
FileDevice Yes
# 保留打印历史
PreserveJobHistory Yes
PreserveJobFiles No

# 默认打印选项优化
DefaultOptions job-hold-until=no-hold
DefaultOptions job-priority=50
DefaultOptions page-delivery=same-order
DefaultOptions collate=true
DefaultOptions job-sheets=none,none

# 内存优化
RIPCache 128m          

# ========== Web 界面 ==========
WebInterface Yes

# ========== 广播发现 ==========
# 启用浏览发现功能
Browsing On
BrowseLocalProtocols dnssd cups
BrowseAddress @LOCAL
BrowseOrder allow,deny
BrowseAllow all
BrowseDeny none
BrowseInterval 30
BrowseTimeout 300

# ========== 访问控制（路径级） ==========
<Location />
  Order allow,deny
  Allow all
</Location>

<Location /printers>
  Order allow,deny
  Allow all
  # 允许匿名打印
  AuthType None
</Location>

<Location /printers/*>
  Order allow,deny
  Allow all
  # 允许匿名打印到具体打印机
  AuthType None
</Location>

<Location /jobs>
  Order allow,deny
  Allow all
</Location>

<Location /admin>
  # 登录页可见，具体操作由 Policy 限制
  Order allow,deny
  Allow all
</Location>

<Location /admin/conf>
  Order allow,deny
  Allow all
</Location>

<Location /admin/log>
  Order allow,deny
  Allow all
</Location>

# ========== 默认策略（权限级） ==========
<Policy default>
  JobPrivateAccess default
  JobPrivateValues default
  SubscriptionPrivateAccess default
  SubscriptionPrivateValues default

  # 1. 任何人：创建/提交/校验作业（无需认证）
  <Limit Create-Job Print-Job Print-URI Validate-Job>
    AuthType None
    Order allow,deny
    Allow all
  </Limit>

  # 2. 任何人：发送文档（防 401 & 0 KB）
  <Limit Send-Document Send-URI>
    AuthType None
    Order allow,deny
    Allow all
  </Limit>

  # 3. 任何人：获取作业属性和状态
  <Limit Get-Job-Attributes Get-Jobs>
    AuthType None
    Order allow,deny
    Allow all
  </Limit>

  # 4. 任何人：取消作业（宽松模式）
  <Limit Cancel-Job>
    AuthType None
    Order allow,deny
    Allow all
  </Limit>

  # 5. 其余作业控制：仅任务拥有者或系统用户
  <Limit Hold-Job Release-Job Restart-Job Purge-Jobs Set-Job-Attributes Create-Job-Subscription Renew-Subscription Cancel-Subscription Get-Notifications Reprocess-Job Cancel-Current-Job Suspend-Current-Job Resume-Job Cancel-My-Jobs Close-Job CUPS-Move-Job CUPS-Get-Document>
    Require user @OWNER @SYSTEM
    Order allow,deny
  </Limit>

  # 6. 打印机管理：仅系统用户
  <Limit CUPS-Add-Modify-Printer CUPS-Delete-Printer CUPS-Add-Modify-Class CUPS-Delete-Class CUPS-Set-Default CUPS-Get-Devices>
    AuthType Default
    Require user @SYSTEM
    Order allow,deny
  </Limit>

  # 7. 打印机状态控制：仅系统用户
  <Limit Pause-Printer Resume-Printer Enable-Printer Disable-Printer Pause-Printer-After-Current-Job Hold-New-Jobs Release-Held-New-Jobs Deactivate-Printer Activate-Printer Restart-Printer Shutdown-Printer Startup-Printer Promote-Job Schedule-Job-After CUPS-Accept-Jobs CUPS-Reject-Jobs>
    AuthType Default
    Require user @SYSTEM
    Order allow,deny
  </Limit>

  # 8. 默认允许其他操作
  <Limit All>
    Order allow,deny
    Allow all
  </Limit>
</Policy>